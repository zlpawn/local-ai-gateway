name: Desktop Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build desktop on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-script: desktop:dist:win
            artifact-name: local-ai-gateway-windows
            artifact-path: |
              dist/*.exe
              dist/*.blockmap
          - os: macos-latest
            build-script: desktop:dist:mac
            artifact-name: local-ai-gateway-macos
            artifact-path: |
              dist/*.dmg
              dist/*.blockmap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check gateway
        run: npm run check

      - name: Check desktop
        run: npm run desktop:check

      - name: Test desktop control layer
        run: npm run desktop:test

      - name: Validate example config
        run: node scripts/validate-config.mjs gateway.config.example.json

      - name: Build desktop package
        run: npm run ${{ matrix.build-script }}

      - name: Smoke test packaged desktop
        run: npm run desktop:smoke

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
